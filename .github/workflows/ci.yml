name: CI/CD Pipeline for Smash Precision

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ==============================
  # Job A: Frontend Validation
  # ==============================
  frontend:
    name: Validate Frontend (React/Vite)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: ./frontend/yarn.lock

    - name: Install Frontend Dependencies
      run: yarn install --frozen-lockfile

    - name: Compile TypeScript (Typecheck)
      run: yarn lint
      
    - name: Production Build Verification
      run: yarn build
      env:
        # Provide fallback env vars so build doesn't crash on missing variables
        VITE_API_URL: http://localhost:3001

  # ==============================
  # Job B: Backend Validation
  # ==============================
  backend:
    name: Validate Backend (NestJS)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
        cache-dependency-path: ./backend/yarn.lock

    - name: Install Backend Dependencies
      run: yarn install --frozen-lockfile

    - name: Run ESLint Code Quality Checks
      # Remove --fix during CI so it fails on warnings/errors instead of trying to fix them silently
      run: yarn eslint "{src,apps,libs,test}/**/*.ts"

    - name: Production Build Verification
      run: yarn build

  # ==============================
  # Job C: Production Deployment
  # ==============================
  deploy:
    name: Deploy to Production
    # This ensures Deploy only runs if Frontend and Backend successfully compiled
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    
    # THE MAGIC: It specifically scans your git commit message!
    if: contains(github.event.head_commit.message, 'deploy prod')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy Frontend to Railway
        # You must configure your RAILWAY_TOKEN in your Repo's GitHub Secrets.
        run: railway up --service frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Backend to Railway
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
